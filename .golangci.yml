version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - gochecknoglobals
    - unparam
    - misspell
  disable:
    - errcheck  # game loop intentionally ignores errors on audio/close calls

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gochecknoglobals  # test helpers are allowed as package-level vars
