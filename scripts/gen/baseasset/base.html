<!doctype html>
<html><head>
  <meta charset="utf-8">
  <title>{{block "title" .}}Firefly Report{{end}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; color: #222; background: #fff; }
    header { background: #1a1a2e; color: #eee; padding: 0.75rem 1.5rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 4rem); }
    aside { background: #f4f4f8; border-right: 1px solid #ddd; padding: 1rem; }
    aside nav ul { list-style: none; }
    aside nav ul li { margin-bottom: 0.5rem; }
    aside nav ul li a { color: #333; text-decoration: none; }
    aside nav ul li a:hover { text-decoration: underline; }
    main { padding: 1.5rem; max-width: 960px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }
    p { margin-bottom: 0.75rem; line-height: 1.6; }
    ul { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    li { margin-bottom: 0.25rem; }
    code { font-family: monospace; background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
    pre.hunk { font-family: monospace; font-size: 0.875rem; background: #fafafa; border: 1px solid #ddd; border-radius: 4px; padding: 0.75rem; overflow-x: auto; margin-bottom: 1rem; }
    .hunk-header { color: #666; display: block; margin-bottom: 0.4rem; }
    span.add { color: #22863a; background: #f0fff4; display: block; }
    span.del { color: #b31d28; background: #fff0f0; display: block; }
    span.ctx { color: #444; display: block; }
    footer { text-align: center; font-size: 0.8rem; color: #888; padding: 1rem; border-top: 1px solid #eee; }
  </style>
</head><body>
  <header><h1>Firefly</h1></header>
  <div class="layout">
    <aside>{{block "sidebar" .}}{{end}}</aside>
    <main>{{block "content" .}}{{end}}</main>
  </div>
  <footer>Generated by scripts/gen</footer>
</body></html>
